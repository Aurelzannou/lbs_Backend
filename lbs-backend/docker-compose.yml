version: '3.9'

services:
  # ============================================
  # Keycloak - Identity Provider
  # Console admin : http://localhost:8180
  # ============================================
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: lbs-keycloak
    environment:
      # Admin credentials pour la console Keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Base de données
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak_db
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: keycloak_password
      # Configuration
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8180
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HEALTH_ENABLED: "true"
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./keycloak/lbs-realm.json:/opt/keycloak/data/import/lbs-realm.json:ro
    ports:
      - "8180:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - lbs-network

  # ============================================
  # PostgreSQL pour Keycloak (base séparée)
  # ============================================
  keycloak-db:
    image: postgres:17
    container_name: lbs-keycloak-db
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: keycloak_user
      POSTGRES_PASSWORD: keycloak_password
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak_user -d keycloak_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lbs-network
  # ============================================
  # MinIO - Stockage S3 local
  # Console UI : http://localhost:9001
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: lbs-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - lbs-network

volumes:
  keycloak_data:
  minio_data:

networks:
  lbs-network:
    driver: bridge
